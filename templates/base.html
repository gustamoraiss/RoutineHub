<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}RoutineHub{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/reset.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/variables.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    {% block header %}
    <header class="header">
        <a href="/" class="header__logo">
            <span class="header__logo-icon">
                <img src="{{ url_for('static', filename='images/logo-svg.svg') }}" alt="Estrelas do logo do RoutineHub">
            </span>
            <span class="header__logo-text">RoutineHub</span>
        </a>

        <nav class="header__nav">
            <a href="/" class="header__nav-link header__nav-link--active">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M19 9.77794V15M5 15V9.77728M21 11.9998L15.5668 5.96381C14.3311 4.59104 13.7133 3.90466 12.9856 3.65126C12.3466 3.4287 11.651 3.42875 11.0119 3.65141C10.2843 3.90491 9.66661 4.59139 8.43114 5.96433L3 11.9998M3 20.0048C3 20.0048 3.69422 18.8856 4.8 19.0096C6.06078 19.151 7.13275 21 8.4 21C9.66725 21 10.7327 19.0096 12 19.0096C13.2673 19.0096 14.3327 21 15.6 21C16.8672 21 17.9392 19.151 19.2 19.0096C20.3058 18.8856 21 20.0048 21 20.0048M10 11H14V15H10V11Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <span>Hoje</span>
            </a>
            <a href="/estatisticas" class="header__nav-link">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path fill-rule="evenodd" clip-rule="evenodd" d="M5.5 18.5V4H4V20H20V18.5H5.5Z" fill="currentColor"/>
                    <path d="M10.5 17V8.00131H12V17H10.5Z" fill="currentColor"/>
                    <path d="M7 17V12H8.5V17H7Z" fill="currentColor"/>
                    <path d="M17.5 17V10H19V17H17.5Z" fill="currentColor"/>
                    <path d="M14 17V5H15.5V17H14Z" fill="currentColor"/>
                </svg>
                <span>Estatísticas</span>
            </a>
        </nav>

        <a href="/rotinas/nova" class="header__cta">
            + Nova rotina
        </a>
    </header>
    {% endblock %}
    <main class="container">{% block content %}{% endblock %}</main>
</body>
</html>
